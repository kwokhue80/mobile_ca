# ===============================
# DATABASE CONFIGURATION (RDS)
# ===============================
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Singapore
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CO-LOCATED CHROMA CONFIGURATION
# ===============================
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8002

# ===============================
# PRODUCTION PERFORMANCE / SECURITY
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false