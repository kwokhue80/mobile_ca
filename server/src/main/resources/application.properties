spring.application.name=server

# ===============================
# SERVER CONFIGURATION
# ===============================
# Matches the port specified in your RetrofitClient
server.port=8000

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_db
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA/HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIGURATION
# ===============================
# A 256-bit (32 byte) Base64 encoded secret key. 
jwt.secret=4qhq8L6M/z0kF+Q/r5n5a7x9t2V3W4Y5Z6a8b9c0d1e=
# Token expiration time in milliseconds (e.g., 86400000 = 24 hours)
jwt.expiration=86400000