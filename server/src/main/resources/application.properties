# ===============================
# SERVER CONFIGURATION
# ===============================
# Matches the port specified in your RetrofitClient
spring.application.name=server
server.address=0.0.0.0
server.port=8000
spring.profiles.active=local

# ===============================
# JPA/HIBERNATE CONFIGURATION
# ===============================
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL (HIKARI)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JWT CONFIGURATION
# ===============================
# A 256-bit (32 byte) Base64 encoded secret key. 
jwt.secret=${JWT_SECRET}
# Token expiration time in milliseconds (e.g., 86400000 = 24 hours)
jwt.expiration=86400000

# ===============================
# OPENAI CONFIGURATION
# ===============================
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.model=nvidia/nemotron-3-ultra-550b-a55b:free
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none

# ===============================
# CHROMA VECTOR STORE
# ===============================
# Disable Chroma auto-configuration to avoid startup failures when no Chroma HTTP server is running.
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration

# If re-enable Chroma, point to a separate Chroma server (do not use the same port as this Spring app).
spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8001}